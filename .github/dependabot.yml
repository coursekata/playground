version: 2

# Policy: group every ecosystem into a single weekly PR and ignore nothing.
# JupyterLab follows semver for the 4.x line, so minor/patch bumps of the
# framework (and its related @jupyterlite / pip runtime packages) are safe to
# see and are validated end-to-end by CI (build wheel -> build the JupyterLite
# app from it -> Playwright integration tests -> deploy on main) before anything
# is merged. Grouping makes a framework bump arrive as ONE reviewable PR rather
# than dozens. For npm<->pip coherence, review the npm and pip group PRs from
# the same weekly batch together.

updates:
  # JavaScript (extension): package.json + yarn.lock
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      js-dependencies:
        patterns:
          - '*'

  # JavaScript (Playwright UI tests): ui-tests/package.json + ui-tests/yarn.lock
  - package-ecosystem: npm
    directory: /ui-tests
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      ui-test-dependencies:
        patterns:
          - '*'

  # Python (pip). The root scan recurses into lite/, so ONE config covers both
  # pyproject.toml and lite/requirements.txt. Grouped by COUPLING, not by manifest
  # or build-vs-runtime:
  #
  #   jupyterlab-stack: the JupyterLab-line packages that MUST move together.
  #     pyproject `jupyterlab` is the compile target; `jupyterlite` provides the
  #     runtime JupyterLab frontend (jupyterlite-core 0.7.x -> JL 4.5.x; 0.8.x ->
  #     4.6). Keeping them in one PR means a line move is reviewed + CI-validated
  #     as a unit. NOTE: npm @jupyterlab/builder (the actual compiler) lives in the
  #     js-dependencies group -- review that npm PR from the same weekly batch
  #     alongside this one. Dependabot does not auto-coordinate the move; CI
  #     (build wheel -> build app -> Playwright) is the validator.
  #
  #   build-tools: hatchling / hatch-nodejs-version -- build backend, independent
  #     of the JupyterLab line.
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      jupyterlab-stack:
        patterns:
          - 'jupyterlab'
          - 'jupyterlite*'
      build-tools:
        patterns:
          - 'hatchling'
          - 'hatch-*'

  # GitHub Actions: .github/workflows/*
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns:
          - '*'
